<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iraq Quantum Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>window.GEMINI_KEY=prompt('أدخل مفتاح Gemini API:','');</script>
<style>
:root{--ibm-blue:#0f62fe;--ibm-cyan:#1192e8;--ibm-teal:#009d9a;--ibm-green:#24a148;--ibm-purple:#8a3ffc;--ibm-magenta:#ee5396;--ibm-red:#da1e28;--gold:#F0B429;--bg:#03060F;--border:rgba(0,245,233,.12);--text:rgba(210,230,255,.85);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;overflow-x:hidden;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(15,98,254,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(15,98,254,.035) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;}
@keyframes popIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes slideIn{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
#auth-page{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-wrap{width:100%;max-width:440px;animation:popIn .45s;}
.auth-logo{text-align:center;margin-bottom:26px;}
.auth-logo .ico{font-size:2.6rem;display:block;margin-bottom:10px;}
.auth-logo h1{font-size:1.5rem;font-weight:900;color:var(--gold);}
.auth-card{background:linear-gradient(145deg,rgba(15,98,254,.1),rgba(0,245,233,.04));border:1px solid var(--border);border-radius:20px;padding:30px 26px;position:relative;}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--ibm-blue),var(--ibm-cyan),transparent);border-radius:20px 20px 0 0;}
.auth-tabs{display:flex;background:rgba(0,0,0,.25);border-radius:10px;padding:4px;margin-bottom:22px;gap:4px;}
.auth-tab{flex:1;padding:9px;border:none;border-radius:8px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.84rem;font-weight:700;background:transparent;color:rgba(200,220,255,.38);transition:.2s;}
.auth-tab.active{background:rgba(15,98,254,.35);color:#fff;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:.74rem;font-weight:700;color:rgba(200,220,255,.42);margin-bottom:6px;}
.field input{width:100%;background:rgba(0,0,0,.3);border:1px solid rgba(0,245,233,.13);border-radius:10px;padding:11px 13px;color:#fff;font-family:'Tajawal',sans-serif;font-size:.9rem;outline:none;direction:ltr;}
.field input:focus{border-color:var(--ibm-cyan);}
.auth-btn{width:100%;padding:13px;border:none;border-radius:11px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.95rem;font-weight:900;background:linear-gradient(135deg,var(--ibm-blue),#0043ce);color:#fff;transition:.25s;}
.auth-btn:hover:not(:disabled){transform:translateY(-2px);}
.auth-btn:disabled{opacity:.5;}
.auth-msg{padding:10px 14px;border-radius:8px;font-size:.79rem;margin-bottom:13px;display:none;}
.auth-msg.ok{background:rgba(36,161,72,.07);border:1px solid rgba(36,161,72,.2);color:rgba(200,255,220,.85);}
.auth-msg.err{background:rgba(218,30,40,.07);border:1px solid rgba(218,30,40,.2);color:rgba(255,200,200,.85);}
.auth-msg.on{display:block;}
#otp-screen{display:none;}
.otp-badge{background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-family:'IBM Plex Mono',monospace;font-size:.74rem;color:var(--ibm-cyan);text-align:center;margin-bottom:14px;}
.otp-inp{width:100%;background:rgba(0,0,0,.3);border:1.5px solid rgba(17,146,232,.2);border-radius:11px;padding:13px;color:var(--ibm-green);font-family:'IBM Plex Mono',monospace;font-size:1.5rem;font-weight:700;letter-spacing:10px;text-align:center;outline:none;direction:ltr;}
#success-screen{display:none;text-align:center;}
.s-ico{font-size:3rem;margin-bottom:10px;}
.s-ttl{font-size:1.1rem;font-weight:900;color:var(--ibm-green);}
#app-page{display:none;}
.topbar{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(3,6,15,.87);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
.topbar-logo{font-size:.88rem;font-weight:900;color:var(--gold);}
.user-em{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:rgba(200,220,255,.35);direction:ltr;}
.logout-btn{background:rgba(218,30,40,.1);border:1px solid rgba(218,30,40,.22);color:rgba(255,150,150,.75);padding:6px 13px;border-radius:8px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.77rem;font-weight:700;}
.hero{position:relative;z-index:10;text-align:center;padding:88px 20px 34px;}
.hero-badge{display:inline-block;background:linear-gradient(135deg,var(--gold),#E08800);color:#000;font-size:.67rem;font-weight:900;padding:5px 17px;border-radius:4px;margin-bottom:15px;}
.hero h1{font-size:clamp(1.8rem,5vw,3rem);font-weight:900;color:var(--gold);margin-bottom:8px;}
.hero p{font-size:.8rem;color:rgba(200,220,255,.38);font-family:'IBM Plex Mono',monospace;}
.live-tag{display:inline-flex;align-items:center;gap:8px;margin-top:13px;background:rgba(36,161,72,.06);border:1px solid rgba(36,161,72,.17);border-radius:30px;padding:6px 17px;font-size:.79rem;color:var(--ibm-green);}
.blink{width:7px;height:7px;border-radius:50%;background:var(--ibm-green);animation:blink 1.4s ease-in-out infinite;}
.stats{position:relative;z-index:10;display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:11px;max-width:840px;margin:0 auto 30px;padding:0 20px;}
.stat{background:linear-gradient(135deg,rgba(15,98,254,.09),rgba(17,146,232,.03));border:1px solid var(--border);border-radius:14px;padding:17px 13px;text-align:center;}
.stat-n{font-size:1.7rem;font-weight:900;font-family:'IBM Plex Mono',monospace;color:var(--ibm-cyan);margin:5px 0 4px;}
.stat-l{font-size:.7rem;color:rgba(200,220,255,.48);}
.lang-btns{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:60;display:flex;gap:7px;background:rgba(3,6,15,.92);border:1px solid var(--border);border-radius:12px;padding:8px;}
.lang-btn{background:rgba(255,255,255,.04);border:1px solid rgba(200,220,255,.08);color:rgba(200,220,255,.42);padding:7px 17px;border-radius:8px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.82rem;font-weight:700;}
.lang-btn.active{background:var(--ibm-blue);color:#fff;}
.search-sec{position:relative;z-index:10;max-width:730px;margin:0 auto 26px;padding:0 20px;}
.sbox{display:flex;background:rgba(0,0,0,.32);border:1.5px solid rgba(17,146,232,.17);border-radius:14px;}
.sinp{flex:1;background:transparent;border:none;padding:14px 17px;color:#fff;font-size:.93rem;font-family:'Tajawal',sans-serif;outline:none;}
.sbtn{background:linear-gradient(135deg,var(--ibm-blue),#0043ce);border:none;color:#fff;padding:9px 24px;border-radius:10px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.85rem;font-weight:900;margin:4px;}
.sbtn:disabled{opacity:.5;}
.sbtn .sp{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;margin-left:8px;}
.res-c{position:relative;z-index:10;max-width:900px;margin:0 auto 50px;padding:0 20px;}
.res-box{background:linear-gradient(145deg,rgba(15,98,254,.08),rgba(17,146,232,.02));border:1px solid var(--border);border-radius:17px;padding:22px 24px;margin-bottom:18px;}
.res-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.res-q{font-size:.92rem;font-weight:700;color:var(--ibm-cyan);}
.res-x{background:rgba(218,30,40,.12);border:1px solid rgba(218,30,40,.22);color:rgba(255,150,150,.7);width:27px;height:27px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.res-txt{font-size:.88rem;line-height:1.88;color:rgba(210,230,255,.75);}
.res-txt pre{background:rgba(0,0,0,.4);border:1px solid rgba(17,146,232,.15);border-radius:10px;padding:14px;margin:12px 0;overflow-x:auto;font-family:'IBM Plex Mono',monospace;font-size:.78rem;color:rgba(210,230,255,.8);}
.sim-btn{background:linear-gradient(135deg,var(--ibm-purple),#6929c4);border:none;color:#fff;padding:10px 20px;border-radius:10px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.84rem;font-weight:900;margin-top:10px;}
.sim-ov{position:fixed;inset:0;z-index:200;display:none;background:rgba(3,6,15,.94);overflow-y:auto;padding:20px;}
.sim-ov.on{display:block;}
.sim-c{max-width:1100px;margin:0 auto;}
.sim-hd{text-align:center;margin-bottom:24px;}
.sim-x{position:absolute;top:15px;left:15px;background:rgba(218,30,40,.15);border:1px solid rgba(218,30,40,.28);color:rgba(255,150,150,.8);width:36px;height:36px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sim-hd-ttl{font-size:1.4rem;font-weight:900;color:var(--ibm-blue);}
.sim-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
@media(max-width:800px){.sim-grid{grid-template-columns:1fr;}}
.sim-card{background:linear-gradient(145deg,rgba(15,98,254,.08),rgba(17,146,232,.02));border:1px solid var(--border);border-radius:16px;padding:20px;}
.sim-ctrls{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.sim-ctrl label{font-size:.77rem;font-weight:700;color:rgba(200,220,255,.48);margin-bottom:7px;display:block;}
.sim-ctrl input,.sim-ctrl select{background:rgba(0,0,0,.35);border:1px solid rgba(17,146,232,.15);border-radius:10px;padding:11px 13px;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:.88rem;width:100%;}
.sim-run{width:100%;background:linear-gradient(135deg,var(--ibm-green),#198038);border:none;color:#fff;padding:14px;border-radius:12px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.95rem;font-weight:900;}
.sim-run:disabled{opacity:.5;}
.sim-code{background:rgba(0,0,0,.5);border:1px solid rgba(17,146,232,.15);border-radius:12px;padding:15px;font-family:'IBM Plex Mono',monospace;font-size:.77rem;color:rgba(210,230,255,.85);max-height:400px;overflow:auto;}
.sim-out-wrap{background:linear-gradient(145deg,rgba(15,98,254,.08),rgba(17,146,232,.02));border:1px solid var(--border);border-radius:16px;padding:20px;min-height:120px;}
.sim-out{background:rgba(0,0,0,.4);border:1px solid rgba(17,146,232,.12);border-radius:12px;padding:16px;font-family:'IBM Plex Mono',monospace;font-size:.78rem;color:rgba(210,230,255,.8);max-height:450px;overflow:auto;display:none;}
.sim-out.on{display:block;}
.sim-bars{margin-top:18px;}
.sim-bar-row{margin-bottom:12px;}
.sim-bar-lbl{display:flex;justify-content:space-between;margin-bottom:6px;font-family:'IBM Plex Mono',monospace;font-size:.76rem;}
.sim-bar-st{color:var(--ibm-cyan);font-weight:700;}
.sim-bar-track{background:rgba(0,0,0,.4);border:1px solid rgba(17,146,232,.12);border-radius:8px;height:28px;overflow:hidden;}
.sim-bar-fill{height:100%;border-radius:6px;transition:width .6s;}
.bar-c0{background:linear-gradient(90deg,var(--ibm-blue),#0043ce);}
.bar-c1{background:linear-gradient(90deg,var(--ibm-cyan),#0072c3);}
.bar-c2{background:linear-gradient(90deg,var(--ibm-teal),#007d79);}
.bar-c3{background:linear-gradient(90deg,var(--ibm-green),#198038);}
.bar-c4{background:linear-gradient(90deg,var(--ibm-purple),#6929c4);}
.bar-c5{background:linear-gradient(90deg,var(--ibm-magenta),#d12765);}
.bar-c6{background:linear-gradient(90deg,#fa4d56,#a2191f);}
.bar-c7{background:linear-gradient(90deg,#ff832b,#ba4e00);}
.download-wrap{background:linear-gradient(145deg,rgba(36,161,72,.08),rgba(36,161,72,.02));border:1px solid rgba(36,161,72,.17);border-radius:14px;padding:18px 20px;margin-top:16px;display:none;}
.download-wrap.on{display:block;}
.download-hd{font-size:.9rem;font-weight:900;color:var(--ibm-green);margin-bottom:12px;}
.download-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.dl-btn{background:linear-gradient(135deg,var(--ibm-green),#198038);border:none;color:#fff;padding:11px 18px;border-radius:10px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.84rem;font-weight:900;}
</style>
</head>
<body>
<div id="auth-page">
<div class="auth-wrap">
<div class="auth-logo">
<span class="ico">⚛️</span>
<h1>Iraq Quantum Lab</h1>
</div>
<div class="auth-card">
<div class="auth-tabs">
<button class="auth-tab active" id="tab-login">دخول</button>
<button class="auth-tab" id="tab-signup">تسجيل</button>
</div>
<div class="auth-msg" id="msg"></div>
<div id="email-screen">

<label>البريد الإلكتروني</label>

</div>

</div>

<div class="stat"><div class="stat-n">#1</div><div class="stat-l">الأول بالعراق</div></div>

<script type="module">
import{createClient}from'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const SB_URL='https://hklcdnofnrmpzngqnmhf.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrbGNkbm9mbnJtcHpuZ3FubWhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE1MjQzMDcsImV4cCI6MjA1NzEwMDMwN30.KfCPphTaKiOzHglp6yg0uIvL_kBhD8KEO4fpkPpbpCA';
const sb=createClient(SB_URL,SB_KEY);
let mode='login';
const showMsg=(t,k)=>{const m=document.getElementById('msg');m.textContent=t;m.classList.toggle('on',!!t);m.classList.toggle('ok',k==='ok');m.classList.toggle('err',k==='err');};
document.getElementById('tab-login').onclick=()=>{mode='login';document.getElementById('tab-login').classList.add('active');document.getElementById('tab-signup').classList.remove('active');document.getElementById('pass-field').style.display='block';};
document.getElementById('tab-signup').onclick=()=>{mode='signup';document.getElementById('tab-signup').classList.add('active');document.getElementById('tab-login').classList.remove('active');document.getElementById('pass-field').style.display='none';};
document.getElementById('submit').onclick=async()=>{
const em=document.getElementById('email').value.trim();
if(!em){showMsg('أدخل الإيميل','err');return;}
if(mode==='signup'){
const{error}=await sb.auth.signInWithOtp({email:em});
if(error){showMsg('فشل','err');return;}
document.getElementById('email-screen').style.display='none';
document.getElementById('otp-screen').style.display='block';
document.getElementById('otp-email').textContent=em;
}else{
const pw=document.getElementById('pass').value;
if(!pw){showMsg('أدخل الباسورد','err');return;}
const{error}=await sb.auth.signInWithPassword({email:em,password:pw});
if(error){showMsg('خطأ','err');return;}
document.getElementById('email-screen').style.display='none';
document.getElementById('success-screen').style.display='block';
setTimeout(loadApp,1500);
}
};
document.getElementById('verify').onclick=async()=>{
const em=document.getElementById('otp-email').textContent;
const code=document.getElementById('otp').value.trim();
if(code.length!==6){showMsg('6 أرقام','err');return;}
const{error}=await sb.auth.verifyOtp({email:em,token:code,type:'email'});
if(error){showMsg('رمز خاطئ','err');return;}
document.getElementById('otp-screen').style.display='none';
document.getElementById('success-screen').style.display='block';
setTimeout(loadApp,1500);
};
async function loadApp(){
const{data:{user}}=await sb.auth.getUser();
if(!user){document.getElementById('auth-page').style.display='flex';return;}
document.getElementById('auth-page').style.display='none';
document.getElementById('app-page').style.display='block';
document.getElementById('user-email').textContent=user.email;
}
document.getElementById('logout').onclick=async()=>{await sb.auth.signOut();location.reload();};
(async()=>{const{data:{session}}=await sb.auth.getSession();if(session)loadApp();})();

let simData=null;
document.getElementById('qbtn').onclick=async()=>{
const q=document.getElementById('qinp').value.trim();
if(!q||!window.GEMINI_KEY)return;
const btn=document.getElementById('qbtn');
btn.disabled=true;btn.innerHTML='<span class="sp"></span>...';
const rbox=document.createElement('div');
rbox.className='res-box';
rbox.innerHTML=`<div class="res-hd"><div class="res-q">${q}</div><button class="res-x" onclick="this.closest('.res-box').remove()">✕</button></div><div class="res-txt">⏳...</div>`;
document.getElementById('results').insertBefore(rbox,document.getElementById('results').firstChild);
document.getElementById('qinp').value='';
try{
const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${window.GEMINI_KEY}`,{
method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({contents:[{parts:[{text:'أنت خبير حوسبة كمية. اشرح بالعربي.\n\n'+q}]}]})
});
const d=await res.json();
let ans=d.candidates?.[0]?.content?.parts?.[0]?.text||'خطأ';
ans=ans.replace(/```/g,'');
const rtxt=rbox.querySelector('.res-txt');
rtxt.innerHTML='';
const pre=document.createElement('pre');
pre.textContent=ans;
rtxt.appendChild(pre);
if(ans.includes('qiskit')||ans.includes('QuantumCircuit')){
const btn2=document.createElement('button');
btn2.className='sim-btn';
btn2.textContent='⚛️ المحاكي';
btn2.onclick=()=>document.getElementById('sim-ov').classList.add('on');
rbox.querySelector('.res-hd').after(btn2);
}
}catch(e){
rbox.querySelector('.res-txt').textContent='خطأ: '+e.message;
}
btn.disabled=false;btn.innerHTML='إرسال';
};

const CIRCUITS={
bell:n=>`qc=QuantumCircuit(${n})\nqc.h(0)\nqc.cx(0,1)`,
ghz:n=>`qc=QuantumCircuit(${n})\nqc.h(0)\n`+Array.from({length:n-1},(_,i)=>`qc.cx(${i},${i+1})`).join('\n'),
superpos:n=>`qc=QuantumCircuit(${n})\n`+Array.from({length:n},(_,i)=>`qc.h(${i})`).join('\n')
};
const updateCode=()=>{
const c=document.getElementById('circ').value;
const n=parseInt(document.getElementById('nq').value)||2;
document.getElementById('code').textContent=CIRCUITS[c]?.(n)||'';
};
document.getElementById('circ').onchange=updateCode;
document.getElementById('nq').oninput=updateCode;
updateCode();

window.closeSim=()=>document.getElementById('sim-ov').classList.remove('on');
document.getElementById('run').onclick=()=>{
const nq=parseInt(document.getElementById('nq').value)||2;
const shots=parseInt(document.getElementById('shots').value)||1024;
const circ=document.getElementById('circ').value;
const counts={};
const states=2**nq;
if(circ==='bell'){
for(let i=0;i<shots;i++){
const r=Math.random()<0.5?0:(states-1);
const st=r.toString(2).padStart(nq,'0');
counts[st]=(counts[st]||0)+1;
}
}else if(circ==='ghz'){
for(let i=0;i<shots;i++){
const r=Math.random()<0.5?0:(states-1);
const st=r.toString(2).padStart(nq,'0');
counts[st]=(counts[st]||0)+1;
}
}else{
for(let i=0;i<shots;i++){
const r=Math.floor(Math.random()*states);
const st=r.toString(2).padStart(nq,'0');
counts[st]=(counts[st]||0)+1;
}
}
const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
let txt=`Shots: ${shots}\nStates: ${sorted.length}\n\n`;
sorted.forEach(([st,cnt])=>txt+=`|${st}⟩ → ${cnt} (${(cnt/shots*100).toFixed(2)}%)\n`);
const out=document.getElementById('out');
out.textContent=txt;
out.classList.add('on');
const bars=document.getElementById('bars');
bars.innerHTML='';
sorted.slice(0,8).forEach(([st,cnt],i)=>{
const p=(cnt/shots*100).toFixed(2);
const row=document.createElement('div');
row.className='sim-bar-row';
row.innerHTML=`<div class="sim-bar-lbl"><span class="sim-bar-st">|${st}⟩</span><span>${cnt} (${p}%)</span></div><div class="sim-bar-track"><div class="sim-bar-fill bar-c${i%8}" style="width:${p}%"></div></div>`;
bars.appendChild(row);
});
simData={counts,shots,sorted};
document.getElementById('dlwrap').classList.add('on');
};

document.getElementById('dlcsv').onclick=()=>{
if(!simData)return;
let csv='State,Count,Probability\n';
simData.sorted.forEach(([st,cnt])=>csv+=`${st},${cnt},${(cnt/simData.shots*100).toFixed(2)}%\n`);
const blob=new Blob([csv],{type:'text/csv'});
const a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='quantum.csv';
a.click();
};
document.getElementById('dlxl').onclick=()=>{
if(!simData||!window.XLSX)return;
const data=simData.sorted.map(([st,cnt])=>({State:st,Count:cnt,Probability:(cnt/simData.shots*100).toFixed(2)+'%'}));
const ws=XLSX.utils.json_to_sheet(data);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,'Results');
XLSX.writeFile(wb,'quantum.xlsx');
};
</script>
