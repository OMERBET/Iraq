<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iraq Quantum Lab | IQ-1 Terminal</title>
    <!-- المكتبات المطلوبة للتقارير -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; overflow-x: hidden; }
        .terminal { border: 1px solid #00ff41; padding: 20px; min-height: 450px; background: rgba(0, 255, 65, 0.02); box-shadow: 0 0 15px rgba(0, 255, 65, 0.1); overflow-y: auto; }
        .input-area { margin-top: 20px; display: flex; gap: 10px; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; flex-grow: 1; outline: none; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #fff; }
        .controls { margin-top: 20px; display: none; gap: 10px; }
        pre { white-space: pre-wrap; word-wrap: break-word; line-height: 1.4; }
        .header-box { border-bottom: 1px solid #00ff41; margin-bottom: 20px; padding-bottom: 10px; }
    </style>
</head>
<body oncontextmenu="return false;"> <!-- منع النقر الأيمن -->

    <div class="header-box">
        <h1 style="margin:0;">🇮🇶 Iraq Quantum Lab</h1>
        <small>Independent Quantum Research & Cybersecurity Unit | IQ-1 Gen.2</small>
    </div>

    <div class="terminal" id="terminalOutput">
        <p>> [SYSTEM] Initializing IQ-1 Cryogenic Coolant... Done (12.5mK)</p>
        <p>> [SYSTEM] 51-Qubit Matrix: STABLE</p>
        <p>> [SYSTEM] Ready for Encrypted Execution. Enter Command:</p>
    </div>
    
    <div class="input-area">
        <input type="text" id="userInput" placeholder="أدخل الأمر (مثلاً: Shor 51 أو Status)..." onkeydown="if(event.key==='Enter') sendQuery()">
        <button onclick="sendQuery()">EXECUTE</button>
    </div>

    <div class="controls" id="controls">
        <button onclick="downloadCSV()" style="background:#444; color:#fff;">تنزيل CSV البيانات الخام</button>
        <button onclick="generatePDF()">تصدير تقرير PDF بختم رسمي</button>
    </div>

    <script>
        // --- 🛡️ نظام الحماية السيبرانية للموقع ---
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) {
                alert("⚠️ نظام Iraq Quantum: الوصول لمصدر الكود محظور لأسباب أمنية.");
                return false;
            }
        };

        let lastResponse = null;

        async function sendQuery() {
            const input = document.getElementById('userInput');
            const query = input.value;
            if(!query) return;

            const output = document.getElementById('terminalOutput');
            output.innerHTML += `<p style="color:#fff; border-top:1px solid #333; padding-top:10px;">> USER@IQ-TERMINAL: ${query}</p>`;
            input.value = "";
            
            try {
                const res = await fetch('/api/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ query })
                });
                lastResponse = await res.json();
                typeWriter(lastResponse.answer);
                document.getElementById('controls').style.display = 'flex';
            } catch (err) {
                output.innerHTML += `<p style="color:red;">> [ERROR] Connection Timeout or Server Failure.</p>`;
            }
        }

        function typeWriter(text) {
            const output = document.getElementById('terminalOutput');
            let i = 0;
            function type() {
                if (i < text.length) {
                    output.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                    i++;
                    setTimeout(type, 5); // سرعة الكتابة
                    output.scrollTop = output.scrollHeight;
                }
            }
            output.innerHTML += "<br>";
            type();
        }

        function downloadCSV() {
            const blob = new Blob([lastResponse.csvData], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = lastResponse.fileName.replace(".pdf", ".csv");
            a.click();
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFont("courier", "bold");
            doc.setFontSize(18);
            doc.text("OFFICIAL QUANTUM ANALYSIS REPORT", 105, 20, {align:"center"});
            doc.setFontSize(10);
            doc.text("IRAQ QUANTUM LAB - CYBERSECURITY UNIT", 105, 28, {align:"center"});
            doc.line(15, 35, 195, 35);
            
            const splitText = doc.splitTextToSize(lastResponse.answer, 180);
            doc.text(splitText, 15, 50);
            
            // إضافة الختم
            const finalY = 250;
            doc.setDrawColor(200, 0, 0);
            doc.rect(150, finalY, 40, 20);
            doc.text("OFFICIAL SEAL", 170, finalY + 8, {align:"center"});
            doc.text("IQ-VERIFIED", 170, finalY + 15, {align:"center"});
            
            doc.save(lastResponse.fileName || "IQ_Report.pdf");
        }
    </script>
</body>
</html>
